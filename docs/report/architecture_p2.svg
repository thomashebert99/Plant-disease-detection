<svg xmlns="http://www.w3.org/2000/svg" width="680" height="580" viewBox="0 0 680 580" role="img">
<title>Architecture Plant Disease Detection</title>
<desc>Schéma d'architecture : expérimentation avec MLflow/DagsHub, stockage sur Hugging Face Hub, API FastAPI avec vote doux sur 3 modèles Keras, réponse JSON et log JSONL de monitoring.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="580" fill="#ffffff"/>

<!-- ── Zone Expérimentation (dashed) ──────────────────── -->
<rect x="20" y="25" width="345" height="95" rx="10" fill="none" stroke="#C2BDB3" stroke-dasharray="6 3" stroke-width="1"/>
<text class="ts" x="35" y="42" dominant-baseline="central" fill="#888780">Expérimentation</text>

<!-- Notebooks -->
<rect x="30" y="52" width="115" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="87" y="74" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Notebooks</text>

<!-- → MLflow/DagsHub -->
<line x1="145" y1="74" x2="183" y2="74" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="183" y="46" width="158" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="262" y="64" text-anchor="middle" dominant-baseline="central" fill="#3C3489">MLflow/DagsHub</text>
<text class="ts" x="262" y="82" text-anchor="middle" dominant-baseline="central" fill="#534AB7">suivi expérimental</text>

<!-- ── Hugging Face Hub ────────────────────────────────── -->
<rect x="430" y="33" width="210" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="535" y="53" text-anchor="middle" dominant-baseline="central" fill="#085041">Hugging Face Hub</text>
<text class="ts" x="535" y="73" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">checkpoints · config</text>

<!-- Arrow Expérimentation → HF Hub -->
<line x1="365" y1="74" x2="430" y2="65" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── Service flow ────────────────────────────────────── -->
<!-- Utilisateur -->
<rect x="20" y="155" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="80" y="183" text-anchor="middle" dominant-baseline="central" fill="#444441">Utilisateur</text>

<line x1="140" y1="183" x2="180" y2="183" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Streamlit -->
<rect x="180" y="155" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="240" y="173" text-anchor="middle" dominant-baseline="central" fill="#085041">Streamlit</text>
<text class="ts" x="240" y="191" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">interface</text>

<line x1="300" y1="183" x2="360" y2="183" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- FastAPI -->
<rect x="360" y="155" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="430" y="173" text-anchor="middle" dominant-baseline="central" fill="#085041">FastAPI</text>
<text class="ts" x="430" y="191" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">prédiction</text>

<!-- HF Hub → model_loader (dashed, à la demande) -->
<path d="M535 93 L535 222 L490 222 L490 231" fill="none" stroke="#C2BDB3" stroke-dasharray="5 3" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="540" y="160" text-anchor="start" dominant-baseline="central" fill="#888780">à la demande</text>

<!-- FastAPI → model_loader -->
<line x1="430" y1="211" x2="430" y2="231" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- model_loader -->
<rect x="330" y="231" width="200" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="430" y="254" text-anchor="middle" dominant-baseline="central" fill="#085041">model_loader</text>
<text class="ts" x="430" y="274" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">lazy load · cache</text>

<!-- Fan model_loader → 3 modèles -->
<path d="M430 291 L430 305 L287 305 L287 321" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M430 291 L430 321" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M430 291 L430 305 L573 305 L573 321" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── 3 modèles Keras ──────────────────────────────────── -->
<rect x="225" y="321" width="125" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="287" y="339" text-anchor="middle" dominant-baseline="central" fill="#633806">EfficientNet</text>
<text class="ts" x="287" y="357" text-anchor="middle" dominant-baseline="central" fill="#854F0B">B0 · B1</text>

<rect x="368" y="321" width="125" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="430" y="339" text-anchor="middle" dominant-baseline="central" fill="#633806">ConvNeXt</text>
<text class="ts" x="430" y="357" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Tiny</text>

<rect x="511" y="321" width="125" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="573" y="339" text-anchor="middle" dominant-baseline="central" fill="#633806">MobileNetV3</text>
<text class="ts" x="573" y="357" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Large · Small</text>

<!-- Convergence modèles → vote doux -->
<path d="M287 377 L287 397 L430 397 L430 417" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M430 377 L430 417" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M573 377 L573 397 L430 397 L430 417" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── Vote doux ───────────────────────────────────────── -->
<rect x="330" y="417" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="430" y="435" text-anchor="middle" dominant-baseline="central" fill="#633806">vote doux</text>
<text class="ts" x="430" y="453" text-anchor="middle" dominant-baseline="central" fill="#854F0B">moy. probabilités</text>

<!-- Sorties -->
<path d="M430 473 L430 489 L310 489 L310 501" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M430 473 L430 489 L550 489 L550 501" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- réponse JSON -->
<rect x="220" y="501" width="180" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="310" y="519" text-anchor="middle" dominant-baseline="central" fill="#27500A">réponse JSON</text>
<text class="ts" x="310" y="537" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">vers Streamlit</text>

<!-- log JSONL -->
<rect x="460" y="501" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="550" y="519" text-anchor="middle" dominant-baseline="central" fill="#444441">log JSONL</text>
<text class="ts" x="550" y="537" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">monitoring</text>
</svg>
