site_name: Plant Disease Detection
site_description: Documentation du projet de diagnostic foliaire par image
site_author: Plant Disease Detection
site_url: https://thomashebert99.github.io/Plant-disease-detection/
repo_url: https://github.com/thomashebert99/Plant-disease-detection
repo_name: thomashebert99/Plant-disease-detection

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: green
      accent: teal
  features:
    - navigation.tabs          # onglets de navigation en haut
    - navigation.sections      # sections dans la sidebar
    - toc.integrate            # table des matières intégrée
    - search.highlight         # surlignage des résultats de recherche
    - content.code.copy        # bouton copier sur les blocs de code

plugins:
  - search

nav:
  - Accueil: index.md
  - Guide de démarrage: getting_started.md
  - Architecture: architecture.md
  - Résultats: results.md
  - Déploiement: deployment.md
  - API: api/index.md
  - MLOps: mlops/index.md
  - Rapport de projet:
      - Cas pratique: report/cas_pratique.md
      - Mise en situation: report/mise_en_situation.md

markdown_extensions:
  - pymdownx.highlight:         # coloration syntaxique des blocs de code
      anchor_linenums: true
  - pymdownx.superfences:       # blocs de code imbriqués + diagrammes Mermaid
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition                  # blocs note/warning/tip
  - tables
